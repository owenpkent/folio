# Default cargo-deny policy.
#
# Auto-copied into a target's Cargo workspace by cargo_deny_scan.py if no
# deny.toml is present. Edit this once you understand which exceptions your
# project genuinely needs. Reference: https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "warn"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # Add specific crate IDs to deny here, e.g.:
    # { name = "openssl", reason = "use rustls instead" },
]
skip = []
skip-tree = []

[licenses]
version = 2
# SPDX expressions allowed in this project. Update to taste.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
