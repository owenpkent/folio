version: 2
updates:
  # Frontend npm dependencies. Minor + patch bumps are grouped into a single
  # monthly PR (always installs cleanly). Major bumps are intentionally left
  # ungrouped so Dependabot opens each as its own PR: breaking upgrades (e.g.
  # pdfjs-dist, react, eslint) must be reviewed and migrated individually, not
  # batched into one unmergeable PR.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      npm-minor:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: chore
      include: scope

  # Rust / Cargo dependencies for the Tauri backend.
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      cargo:
        patterns: ["*"]
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
