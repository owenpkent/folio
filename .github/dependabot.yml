version: 2
updates:
  # Frontend npm dependencies. Grouped into a single monthly PR to cut noise.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      npm:
        patterns: ["*"]
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: chore
      include: scope

  # Rust / Cargo dependencies for the Tauri backend.
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      cargo:
        patterns: ["*"]
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
