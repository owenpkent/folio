name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast feedback: lint, typecheck, and unit tests on Ubuntu across Node 20 & 22.
  quality:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Fail if the `tauri` crate and `@tauri-apps/api` drift in major.minor,
      # which can silently break cross-window IPC (see scripts/check-tauri-versions.mjs).
      - name: Check Tauri version parity
        run: npm run check:versions

      - name: Unit tests
        run: npm run test

  # Browser end-to-end smoke tests: open, render, fill a form, and digitally sign.
  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      # Measure how far a saved copy sits from PDF/UA-1, which Section 508
      # 504.2.2 asks an authoring tool to be capable of exporting.
      #
      # Informational on purpose. PDF/UA export is a known "Does Not Support"
      # (docs/508-conformance.md): no JS library can author a structure tree into
      # an existing PDF, so this WILL report failures and must never block the
      # build. It exists so the gap is a tracked number rather than a guess, and
      # so a regression on the parts we do satisfy (/Contents on annotations,
      # Tabs=S on annotated pages) shows up in the report.
      #
      # veraPDF implements only the machine-checkable subset of PDF/UA — a clean
      # run would still say nothing about reading order, which is human-judged.
      - name: Measure PDF/UA-1 conformance of exports (informational)
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          mkdir -p test-results/exports pdfua-report
          if [ -z "$(ls -A test-results/exports)" ]; then
            echo "No exports were produced; skipping." | tee pdfua-report/report.txt
            exit 0
          fi
          docker run --rm \
            -v "${{ github.workspace }}/test-results/exports:/data:ro" \
            verapdf/cli@sha256:d5ee329657cf9bc4b2400392dd54c7d0a0ce9980ff6fa2da5590eebeec007cdb \
            --flavour ua1 --format text -r /data \
            | tee pdfua-report/report.txt

      - name: Upload PDF/UA report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pdfua-report
          path: pdfua-report/
          retention-days: 7

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Debug Tauri build across all three desktop platforms to catch breakage.
  build:
    name: Tauri debug build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # --no-bundle: compile-only smoke test across all three desktop OSes.
      # Bundling is skipped in CI because the installer needs the EV cert +
      # updater signing key, which live only on the release host.
      - name: Tauri debug build (no bundle)
        run: npm run tauri -- build --debug --no-bundle
