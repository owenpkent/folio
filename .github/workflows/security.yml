name: security

# Drop-in security workflow. Installed by security-tooling/scripts/install-in-repo.ps1.
# All third-party Actions pinned to commit SHAs. Update intentionally.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "37 6 * * *"   # daily 06:37 UTC
  workflow_dispatch:

# Least privilege at the top; jobs opt into the extra write scope they need.
permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: gitleaks + semgrep + zizmor + deps
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # reviewdog posts inline PR review comments (PR runs only)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      # ---- gitleaks ----
      - name: Install gitleaks
        run: |
          GL_VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VER}/gitleaks_${GL_VER}_linux_x64.tar.gz" -o gl.tgz
          sudo tar -xzf gl.tgz -C /usr/local/bin gitleaks
      - name: Gitleaks (SARIF)
        run: gitleaks dir . --report-format sarif --report-path gitleaks.sarif --no-banner --exit-code 0

      # ---- semgrep + zizmor ----
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Install semgrep + zizmor
        run: pip install semgrep zizmor
      - name: Semgrep (SARIF)
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --sarif --sarif-output=semgrep.sarif \
            --metrics=off --quiet . || true
      - name: zizmor (workflows audit, SARIF)
        if: hashFiles('.github/workflows/**') != ''
        run: zizmor --format sarif .github/workflows/ > zizmor.sarif || true

      # ---- dep audits ----
      - name: pip-audit (if Python deps present)
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        run: |
          pip install pip-audit
          pip-audit -f json -o pip-audit.json || true
      - name: npm audit (if package.json present)
        if: hashFiles('package.json') != ''
        run: npm audit --json > npm-audit.json || true
      - name: cargo audit (if Cargo.toml present)
        if: hashFiles('Cargo.toml', 'src-tauri/Cargo.toml') != ''
        run: |
          cargo install cargo-audit --quiet
          cargo audit --json > cargo-audit.json || true

      # ---- reviewdog PR-inline comments ----
      - name: Install reviewdog
        if: github.event_name == 'pull_request'
        run: |
          RD_VER=0.20.3
          curl -sSfL "https://github.com/reviewdog/reviewdog/releases/download/v${RD_VER}/reviewdog_${RD_VER}_Linux_x86_64.tar.gz" -o rd.tgz
          sudo tar -xzf rd.tgz -C /usr/local/bin reviewdog
      - name: "reviewdog: gitleaks"
        if: github.event_name == 'pull_request' && hashFiles('gitleaks.sarif') != ''
        env: { REVIEWDOG_GITHUB_API_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: reviewdog -f=sarif -name=gitleaks -reporter=github-pr-review -level=warning < gitleaks.sarif || true
      - name: "reviewdog: semgrep"
        if: github.event_name == 'pull_request' && hashFiles('semgrep.sarif') != ''
        env: { REVIEWDOG_GITHUB_API_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: reviewdog -f=sarif -name=semgrep -reporter=github-pr-review -level=warning < semgrep.sarif || true
      - name: "reviewdog: zizmor"
        if: github.event_name == 'pull_request' && hashFiles('zizmor.sarif') != ''
        env: { REVIEWDOG_GITHUB_API_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: reviewdog -f=sarif -name=zizmor -reporter=github-pr-review -level=warning < zizmor.sarif || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        continue-on-error: true
        with:
          name: security-reports
          path: |
            gitleaks.sarif
            semgrep.sarif
            zizmor.sarif
            pip-audit.json
            npm-audit.json
            cargo-audit.json

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false
      - name: Upload Scorecard SARIF
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        continue-on-error: true
        with:
          name: scorecard-sarif
          path: scorecard.sarif

  open-issues:
    name: Open issues for new findings
    runs-on: ubuntu-latest
    needs: [scan, scorecard]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      issues: write   # files GitHub issues for new high/critical findings
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with: { path: artifacts }
      - name: File issues for high/critical findings
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          python <<'PY'
          import json, subprocess, sys
          from pathlib import Path
          def existing_titles():
              out = subprocess.run(["gh","issue","list","--state","open","--label",
                                    "security-finding","--json","title","-L","200"],
                                   capture_output=True, text=True, check=True).stdout
              return {x["title"] for x in json.loads(out or "[]")}
          existing = existing_titles()
          opened = 0
          for sarif_path in Path("artifacts").rglob("*.sarif"):
              try: data = json.loads(sarif_path.read_text())
              except Exception: continue
              tool = sarif_path.stem
              for run in data.get("runs", []):
                  rules = {r.get("id"): r for r in (run.get("tool",{}).get("driver",{}).get("rules") or [])}
                  for res in run.get("results", []):
                      level = (res.get("level") or "warning").lower()
                      rule_id = res.get("ruleId","?")
                      sec_sev = float((rules.get(rule_id,{}).get("properties",{}) or {}).get("security-severity") or 0)
                      if level != "error" and sec_sev < 7.0: continue
                      msg = (res.get("message") or {}).get("text","")
                      locs = res.get("locations",[]) or []
                      where = ""
                      if locs:
                          phys = (locs[0].get("physicalLocation") or {})
                          where = (phys.get("artifactLocation") or {}).get("uri","")
                          line = (phys.get("region") or {}).get("startLine","?")
                          where = f"{where}:{line}"
                      title = f"[security] {tool}/{rule_id} - {where}"
                      if title in existing: continue
                      body = f"**Tool:** `{tool}`\n**Rule:** `{rule_id}`\n**Location:** `{where}`\n\n{msg}\n\n---\n_Auto-filed by security workflow._"
                      try:
                          subprocess.run(["gh","issue","create","--title",title,"--body",body,
                                          "--label","security-finding,automated"], check=True)
                          existing.add(title); opened += 1
                      except subprocess.CalledProcessError as e:
                          print(f"gh issue create failed: {e}", file=sys.stderr)
          print(f"Opened {opened} issue(s).")
          PY
